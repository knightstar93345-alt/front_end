<!DOCTYPE html>
<html>
<head>
    <title>Table with Colspan</title>
</head>
<body>
    <h2>Department Budget</h2>
    <table border="1">
        <tr>
            <th>Department</th>
            <th colspan="2">Budget (in $)</th>
        </tr>
        <tr>
            <td rowspan="2">IT</td>
            <td>2024</td>
            <td>2025</td>
        </tr>
        <tr>
             <td>2024</td>
            <td>2025</td>
        </tr>
        <tr>
            <td>HR</td>
            <td>5000</td>
            <td>6000</td>
        </tr>
    </table>
</body>
</html>
